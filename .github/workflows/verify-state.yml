name: Verify State

on:
  push:
  pull_request:

jobs:
  verify-state:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Install Dafny
        run: dotnet tool install --global dafny

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Run verifier
        run: npm run verify:local

      - name: Post or update verification issue
        if: always() && github.event_name == 'push'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INVARIANT_ENABLE_ISSUE_FILING: "true"
        run: npm run issues:post

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-verification-artifacts
          path: artifacts/phase2
